<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>บอร์ดรวมงาน</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space"><div><strong>บอร์ดรวมงาน</strong> <span id="welcome" class="small"></span></div><div class="row"><a class="ghost" href="board.html">บอร์ดรวม</a><a class="ghost" href="staff.html">ส่งงานของฉัน</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header>
<div class="wrap filters"><div class="panel"><div class="grid grid-4"><div><label>Outlet</label><select id="fOutlet"><option value="">ทั้งหมด</option><option>Hotel</option><option>Villa</option><option>Public Area</option><option>Laundry</option></select></div><div><label>ตึก</label><select id="fBuilding"><option value="">ทั้งหมด</option><option>A</option><option>B</option><option>C</option><option>D</option></select></div><div><label>ชั้น</label><select id="fFloor"><option value="">ทั้งหมด</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option></select></div><div><label>สถานะ / ห้อง</label><div class="grid grid-2"><select id="fStatus"><option value="">ทั้งหมด</option></select><input id="fRoom" placeholder="ค้นหา A105"></div></div></div></div></div>
<div class="wrap"><div class="stats" style="margin:16px 0"><div class="stat"><div class="small">งานทั้งหมด</div><div class="n" id="sAll">0</div></div><div class="stat"><div class="small">กำลังทำ</div><div class="n" id="sProg">0</div></div><div class="stat"><div class="small">รอตรวจ</div><div class="n" id="sWait">0</div></div><div class="stat"><div class="small">เกินเวลา</div><div class="n" id="sOver">0</div></div></div><div id="board" class="board"></div></div>
<dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><a href="staff.html"><button class="good">ไปหน้าส่งงาน</button></a><button class="ghost" onclick="document.getElementById('taskDialog').close()">ปิด</button></div></div></dialog>
<script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>
const session=requireRole('staff');document.getElementById('welcome').textContent='— '+session.name;document.getElementById('logoutBtn').onclick=logout;STATUSES.forEach(s=>{const op=document.createElement('option');op.value=s;op.textContent=s;document.getElementById('fStatus').appendChild(op)});['fOutlet','fBuilding','fFloor','fStatus','fRoom'].forEach(id=>document.getElementById(id).addEventListener('input',()=>render()));
function getFilters(){return{outlet:document.getElementById('fOutlet').value,building:document.getElementById('fBuilding').value,floor:document.getElementById('fFloor').value,status:document.getElementById('fStatus').value,room:document.getElementById('fRoom').value.trim()}}
function card(t){return `<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">ผู้รับผิดชอบ: ${escapeHtml(t.assignee||'-')} • สถานะห้อง: ${escapeHtml(t.roomStatus||'-')}</div><div class="badges">${statusBadge(t)}</div><div class="actions"><button onclick="openTask('${t.id}')">ดูรายละเอียด</button><a href="staff.html"><button class="good">ส่งงาน</button></a></div></article>`}
let latestTasks=[];async function render(tasksOverride){latestTasks=tasksOverride||await getTasks();const filtered=applyBoardFilters(latestTasks,getFilters());document.getElementById('sAll').textContent=filtered.length;document.getElementById('sProg').textContent=filtered.filter(t=>t.status==='In Progress').length;document.getElementById('sWait').textContent=filtered.filter(t=>t.status==='Waiting Approval').length;document.getElementById('sOver').textContent=filtered.filter(isOverdue).length;document.getElementById('board').innerHTML=STATUSES.map(s=>{const items=filtered.filter(t=>t.status===s);return `<section class="column"><h3>${s} <span class="small">(${items.length})</span></h3>${items.map(card).join('')||'<div class="small">ไม่มีงาน</div>'}</section>`}).join('')}
window.openTask=async id=>{await renderTaskDetail(id,'taskDetail');document.getElementById('taskDialog').showModal();}
document.getElementById('enablePushBtn').onclick=async()=>{try{if(!isFirebaseReady())throw new Error('ยังไม่ได้เชื่อม Firebase');await window.firebaseHelpers.registerDeviceToken(session);toast('เปิดแจ้งเตือนสำเร็จ');}catch(err){alert('เปิดแจ้งเตือนไม่สำเร็จ: '+err.message)}};
(async()=>{await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();
</script></body></html>
