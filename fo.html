<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Front Office</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space"><div><div class="top-title">FRONT OFFICE</div><div id="welcome" class="small"></div></div><div class="row"><a href="fo.html" class="ghost">หน้า FO</a><a href="board.html" class="ghost">บอร์ดรวม</a><a href="log.html" class="ghost">LOG / Report</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header>
<div class="wrap grid grid-2">
  <div class="panel"><div class="section-head"><h2 class="section-title">เปิดงานให้ HouseKeeping</h2><div id="firebaseStatus" class="firebase-inline"></div></div>
    <form id="taskForm" class="grid">
      <div><label>ชื่องาน</label><input id="title" required></div>
      <div><label>รายละเอียด</label><textarea id="desc"></textarea></div>
      <div class="grid grid-4">
        <div><label>Outlet</label><select id="outlet"><option>Hotel</option><option>Villa</option><option>Public Area</option><option>Laundry</option></select></div>
        <div><label>เลขห้อง</label><input id="roomNumber" placeholder="เช่น A105"></div>
        <div><label>ประเภทงาน</label><select id="taskType"><option>Room Ready</option><option>Guest Request</option><option>Room Status Update</option><option>Lost &amp; Found</option><option>Public Area</option><option>Deep Cleaning</option></select></div>
        <div><label>Priority</label><select id="priority"><option>Medium</option><option>High</option><option>Urgent</option></select></div>
      </div>
      <div class="grid grid-3">
        <div><label>ผู้รับงาน HK</label><input id="assignee"></div>
        <div><label>สถานะห้อง</label><select id="roomStatus"><option>Vacant Dirty</option><option>Vacant Clean</option><option>Inspected</option><option>Occupied</option><option>OOO</option></select></div>
        <div><label>กำหนดเสร็จ</label><input id="dueAt" type="datetime-local"></div>
      </div>
      <button class="good">ส่งงานไป HK</button>
    </form>
  </div>
  <div class="panel"><div class="section-head"><h2 class="section-title">งานที่ FO เปิด</h2></div><div id="foTasks"></div></div>
</div>
<dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="document.getElementById('taskDialog').close()">ปิด</button></div></div></dialog>
<script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script>
<script>
const session=requireRole('fo');
document.getElementById('welcome').textContent='ผู้ใช้งาน: '+session.name;
document.getElementById('logoutBtn').onclick=logout;
document.getElementById('enablePushBtn').onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');
document.getElementById('dueAt').value=nowIsoLocal();
async function render(dataOverride){
  const data=dataOverride||await getData();
  const tasks=(data.tasks||[]).filter(t=>t.requestedBy===session.name);
  document.getElementById('foTasks').innerHTML = tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">HK: ${escapeHtml(t.assignee||'-')} • สถานะ: ${escapeHtml(t.status)}</div><div class="badges">${statusBadge(t)}</div><div class="actions"><button onclick="openTask('${t.id}')">ดู</button><button class="good" ${t.status==='Done by HK'?'':'disabled'} onclick="closeJob('${t.id}')">Close job by FO</button></div></article>`).join('')||'<div class="small">ยังไม่มีงาน</div>';
}
window.openTask=async id=>{await renderTaskDetail(id,'taskDetail','tasks');document.getElementById('taskDialog').showModal();};
window.closeJob=async id=>{await closeTaskToLog(id, session.name); await render();};
document.getElementById('taskForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const roomInput=document.getElementById('roomNumber').value.trim().toUpperCase();
  const task={id:uid(),title:document.getElementById('title').value.trim(),desc:document.getElementById('desc').value.trim(),outlet:document.getElementById('outlet').value,roomNumber:roomInput,room:roomInput,department:'Front Office',taskType:document.getElementById('taskType').value,requestedBy:session.name,assignee:document.getElementById('assignee').value.trim(),priority:document.getElementById('priority').value,dueAt:document.getElementById('dueAt').value,roomStatus:document.getElementById('roomStatus').value,pushEnabled:true,status:'New from FO',images:[],comments:[{at:new Date().toISOString(),by:session.name,text:'FO เปิดงานใหม่'}],createdBy:session.name,createdAt:new Date().toISOString()};
  await updateTask(task);
  document.getElementById('taskForm').reset();
  document.getElementById('dueAt').value=nowIsoLocal();
  await render();
});
(async()=>{
  setFirebaseStatus('firebaseStatus','checking');
  const fb = await checkFirebaseConnection();
  if(fb.ok) setFirebaseStatus('firebaseStatus','connected', fb.detail); else setFirebaseStatus('firebaseStatus', fb.mode, fb.detail);
  await seedData(); await render();
  if(isFirebaseReady()){
    const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(async(data)=>{await render(data); const fb2=await checkFirebaseConnection(); if(fb2.ok) setFirebaseStatus('firebaseStatus','connected', fb2.detail);})}},500);
  }
})();
</script></body></html>
