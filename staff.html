<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>หน้าพนักงาน</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space"><div><strong>หน้าพนักงาน</strong> <span id="welcome" class="small"></span></div><div class="row"><a href="board.html" class="ghost">บอร์ดรวม</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header>
<div class="wrap grid grid-2"><div class="panel"><h2 style="margin-top:0">งานที่ได้รับมอบหมาย</h2><div class="small">พนักงานเห็นเฉพาะงานที่ชื่อตรงกับตัวเอง หรือยังไม่ระบุคนทำ</div><div id="myTasks" style="margin-top:12px"></div></div><div class="panel"><h2 style="margin-top:0">ส่งงาน / อัปเดตงาน</h2><form id="submitForm" class="grid"><div><label>เลือกงาน</label><select id="taskId"></select></div><div><label>เปลี่ยนสถานะ</label><select id="status"><option>In Progress</option><option>Waiting Approval</option><option>Rework</option></select></div><div><label>คอมเมนต์อัปเดต</label><textarea id="comment" placeholder="เช่น ทำเสร็จแล้ว แนบรูปผลงาน"></textarea></div><div><label>อัปโหลดรูปผลงาน</label><input id="images" type="file" accept="image/*" multiple></div><button class="good">บันทึกและส่งงาน</button></form></div></div>
<dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="document.getElementById('taskDialog').close()">ปิด</button></div></div></dialog>
<script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>
const session=requireRole('staff');document.getElementById('welcome').textContent='— '+session.name;document.getElementById('logoutBtn').onclick=logout;document.getElementById('enablePushBtn').onclick=async()=>{try{if(!isFirebaseReady())throw new Error('ยังไม่ได้เชื่อม Firebase');await window.firebaseHelpers.registerDeviceToken(session);toast('เปิดแจ้งเตือนสำเร็จ');}catch(err){alert('เปิดแจ้งเตือนไม่สำเร็จ: '+err.message)}};
async function visibleTasks(){const tasks=await getTasks();return tasks.filter(t=>!t.assignee||t.assignee===session.name)}
async function render(tasksOverride){const tasks=tasksOverride||await visibleTasks();document.getElementById('myTasks').innerHTML=tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">สถานะ: ${escapeHtml(t.status)} • สถานะห้อง: ${escapeHtml(t.roomStatus||'-')}</div><div class="actions"><button onclick="openTask('${t.id}')">ดู</button><button class="good" onclick="quickUpdate('${t.id}','In Progress')">เริ่มงาน</button><button class="warn" onclick="quickUpdate('${t.id}','Waiting Approval')">ส่งตรวจ</button></div></article>`).join('')||'<div class="small">ยังไม่มีงานที่มอบหมายให้คุณ</div>';document.getElementById('taskId').innerHTML=tasks.map(t=>`<option value="${t.id}">${escapeHtml(t.title)} (${escapeHtml(t.room||'-')})</option>`).join('')}
window.openTask=async id=>{await renderTaskDetail(id,'taskDetail');document.getElementById('taskDialog').showModal();}
window.quickUpdate=async (id,status)=>{const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t)return;t.status=status;t.assignee=session.name;t.pushEnabled=true;t.comments||=[];t.comments.unshift({at:new Date().toISOString(),by:session.name,text:status==='In Progress'?'เริ่มงานแล้ว':'ส่งงานรอตรวจ'});await updateTask(t);await render();}
document.getElementById('submitForm').addEventListener('submit',async e=>{e.preventDefault();const id=document.getElementById('taskId').value;const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t)return;t.status=document.getElementById('status').value;t.assignee=session.name;t.pushEnabled=true;t.images||=[];const imgs=await readFiles(document.getElementById('images').files);t.images.unshift(...imgs);const comment=document.getElementById('comment').value.trim();if(comment){t.comments||=[];t.comments.unshift({at:new Date().toISOString(),by:session.name,text:comment})}await updateTask(t);document.getElementById('submitForm').reset();await render();alert('บันทึกเรียบร้อย')});
(async()=>{await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(async()=>render(await visibleTasks()))}},500)}})();
</script></body></html>
