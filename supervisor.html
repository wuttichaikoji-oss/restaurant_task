<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>หน้าหัวหน้างาน</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space"><div><strong>หน้าหัวหน้างาน</strong> <span id="welcome" class="small"></span></div><div class="row"><a href="supervisor.html"><button class="ghost">Assign งาน</button></a><a href="board.html"><button class="ghost">หน้าบอร์ดรวม</button></a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header>
<div class="wrap grid grid-2"><div class="panel"><h2 style="margin-top:0">สร้าง / Assign งาน</h2><form id="taskForm" class="grid"><div><label>ชื่องาน</label><input id="title" required></div><div><label>รายละเอียด</label><textarea id="desc"></textarea></div><div class="grid grid-4"><div><label>Outlet</label><select id="outlet"><option>Hotel</option><option>Villa</option><option>Public Area</option><option>Laundry</option></select></div><div><label>ตึก</label><select id="building"><option>A</option><option>B</option><option>C</option><option>D</option></select></div><div><label>ชั้น</label><select id="floor"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option></select></div><div><label>เลขห้อง</label><input id="roomNumber" placeholder="105"></div></div><div class="grid grid-3"><div><label>ผู้รับผิดชอบ</label><input id="assignee" placeholder="พิมพ์ชื่อผู้รับผิดชอบ"></div><div><label>แผนก</label><select id="department"><option>HouseKeeping</option><option>Front Office</option></select></div><div><label>ประเภทงาน</label><select id="taskType"><option>Room Ready</option><option>Guest Request</option><option>Room Status Update</option><option>Lost &amp; Found</option><option>Public Area</option><option>Deep Cleaning</option></select></div></div><div class="grid grid-4"><div><label>Priority</label><select id="priority"><option>Medium</option><option>High</option><option>Urgent</option></select></div><div><label>สถานะห้อง</label><select id="roomStatus"><option>Vacant Dirty</option><option>Vacant Clean</option><option>Inspected</option><option>Occupied</option><option>OOO</option></select></div><div><label>กำหนดเสร็จ</label><input id="dueAt" type="datetime-local"></div><div><label>Push แจ้งเตือน</label><select id="pushEnabled"><option value="true">เปิด</option><option value="false">ปิด</option></select></div></div><button class="good">โพสต์งานลงบอร์ด</button></form></div><div class="panel"><h2 style="margin-top:0">งานทั้งหมด</h2><div id="allTasks"></div></div></div>
<dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="document.getElementById('taskDialog').close()">ปิด</button></div></div></dialog>
<script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>
const session=requireRole('supervisor');document.getElementById('welcome').textContent='— '+session.name;document.getElementById('logoutBtn').onclick=logout;document.getElementById('dueAt').value=nowIsoLocal();document.getElementById('enablePushBtn').onclick=async()=>{try{if(!isFirebaseReady())throw new Error('ยังไม่ได้เชื่อม Firebase');await window.firebaseHelpers.registerDeviceToken(session);toast('เปิดแจ้งเตือนสำเร็จ');}catch(err){alert('เปิดแจ้งเตือนไม่สำเร็จ: '+err.message)}};
</option>`).join('')}
async function render(tasksOverride){const tasks=tasksOverride||await getTasks();document.getElementById('allTasks').innerHTML=tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">ผู้รับผิดชอบ: ${escapeHtml(t.assignee||'-')} • สถานะห้อง: ${escapeHtml(t.roomStatus||'-')}</div><div class="badges">${statusBadge(t)}</div><div class="actions"><button onclick="openTask('${t.id}')">ดู</button><button class="good" onclick="setStatus('${t.id}','Approved')">ผ่านงาน</button><button class="warn" onclick="setStatus('${t.id}','Rework')">ตีกลับ</button><button class="secondary" onclick="reassign('${t.id}')">เปลี่ยนคนทำ</button><button class="bad" onclick="removeTask('${t.id}')">ลบ</button></div></article>`).join('')||'<div class="small">ยังไม่มีงาน</div>'}
window.openTask=async id=>{await renderTaskDetail(id,'taskDetail');document.getElementById('taskDialog').showModal();}
window.setStatus=async (id,status)=>{const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t)return;t.status=status;t.comments||=[];t.comments.unshift({at:new Date().toISOString(),by:session.name,text:status==='Approved'?'หัวหน้ากดผ่านงาน':'หัวหน้าตีกลับงาน'});await updateTask(t);await render();}
window.reassign=async id=>{const staffNames=USERS.filter(u=>u.role==='staff').map(u=>u.name).join(' / ');const name=prompt('ระบุชื่อผู้รับผิดชอบใหม่: '+staffNames);if(!name)return;const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t)return;t.assignee=name.trim();t.status='Assigned';t.comments||=[];t.comments.unshift({at:new Date().toISOString(),by:session.name,text:'Assign ใหม่ให้ '+name.trim()});await updateTask(t);await render();}
window.removeTask=async id=>{if(!confirm('ลบงานนี้?'))return;await deleteTaskById(id);await render();}
document.getElementById('taskForm').addEventListener('submit',async e=>{e.preventDefault();const building=document.getElementById('building').value;const roomNumber=document.getElementById('roomNumber').value.trim();const task={id:uid(),title:document.getElementById('title').value.trim(),desc:document.getElementById('desc').value.trim(),outlet:document.getElementById('outlet').value,building,floor:document.getElementById('floor').value,roomNumber,room:building+roomNumber,department:document.getElementById('department').value,taskType:document.getElementById('taskType').value,assignee:document.getElementById('assignee').value,priority:document.getElementById('priority').value,dueAt:document.getElementById('dueAt').value,roomStatus:document.getElementById('roomStatus').value,pushEnabled:document.getElementById('pushEnabled').value==='true',status:document.getElementById('assignee').value?'Assigned':'New',images:[],comments:[{at:new Date().toISOString(),by:session.name,text:'หัวหน้าสร้างงาน'}],createdBy:session.name,createdAt:new Date().toISOString()};await updateTask(task);document.getElementById('taskForm').reset();document.getElementById('dueAt').value=nowIsoLocal();await render()});
(async()=>{await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();
</script></body></html>
