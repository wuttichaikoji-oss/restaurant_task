<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Supervisor</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space"><div class="brand"><div class="brand-logo-wrap"><img class="brand-logo" src="assets/laya-logo.png" alt="Laya Resort Phuket"></div><div class="brand-copy"><div class="brand-sub">Laya Resort Phuket</div><div class="top-title">SUPERVISOR</div><div id="welcome" class="small"></div></div></div><div class="row"><a href="board.html" class="ghost">บอร์ดรวม</a><a href="log.html" class="ghost">LOG / Report</a><a href="fo.html" class="ghost">หน้า FO</a><a href="hk.html" class="ghost">หน้า HK</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header>
<div class="wrap">
  <div id="firebaseStatus" class="firebase-inline" style="margin-bottom:14px;"></div>
  <div class="panel"><h2 class="section-title">ภาพรวมระบบ</h2><div id="allTasks"></div></div>

  <div class="panel token-panel">
    <div class="section-head">
      <h2 class="section-title">สถานะอุปกรณ์ที่เปิดแจ้งเตือน</h2>
      <button class="ghost" id="refreshTokensBtn">รีเฟรช</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="small">เครื่องทั้งหมด</div><div class="n" id="tokAll">0</div></div>
      <div class="stat"><div class="small">HK เปิดแจ้งเตือน</div><div class="n" id="tokHK">0</div></div>
      <div class="stat"><div class="small">FO เปิดแจ้งเตือน</div><div class="n" id="tokFO">0</div></div>
      <div class="stat"><div class="small">Supervisor เปิดแจ้งเตือน</div><div class="n" id="tokSV">0</div></div>
    </div>
    <div class="token-grid">
      <div class="token-box">
        <h3 class="section-title" style="font-size:16px">HK ที่เปิดแจ้งเตือนแล้ว</h3>
        <div id="hkTokenList"></div>
      </div>
      <div class="token-box">
        <h3 class="section-title" style="font-size:16px">FO ที่เปิดแจ้งเตือนแล้ว</h3>
        <div id="foTokenList"></div>
      </div>
      <div class="token-box">
        <h3 class="section-title" style="font-size:16px">Supervisor ที่เปิดแจ้งเตือนแล้ว</h3>
        <div id="svTokenList"></div>
      </div>
    </div>
  </div>
</div>
<script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script>
<script>
const session=requireRole('supervisor');
document.getElementById('welcome').textContent='ผู้ใช้งาน: '+session.name;
document.getElementById('logoutBtn').onclick=logout;
document.getElementById('enablePushBtn').onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');

async function render(dataOverride){
  const data=dataOverride||await getData(); const tasks=data.tasks||[], logs=data.logs||[];
  const parts = splitActiveAndLegacyTasks(tasks);
  const active = parts.active, legacy = parts.legacy;
  document.getElementById('allTasks').innerHTML = 
    `<div class="stats"><div class="stat"><div class="small">Active Tasks</div><div class="n">${active.length}</div></div><div class="stat"><div class="small">Legacy Hidden</div><div class="n">${legacy.length}</div></div><div class="stat"><div class="small">Closed Logs</div><div class="n">${logs.length}</div></div><div class="stat"><div class="small">Done by HK</div><div class="n">${active.filter(t=>t.status==='Done by HK').length}</div></div></div>` +
    (legacy.length ? `<div class="notice" style="margin-bottom:14px;">มี legacy status ${legacy.length} งาน ถูกซ่อนออกจากบอร์ดรวมแล้ว</div>` : '') +
    (active.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • HK: ${escapeHtml(t.assignee||'-')} • สถานะ: ${escapeHtml(t.status)}</div></article>`).join('') || '<div class="small">ยังไม่มีงาน</div>');
}
async function renderTokens(){
  const info = await loadTokenStatus();
  document.getElementById('tokAll').textContent = info.tokens.length;
  document.getElementById('tokHK').textContent = info.hk.length;
  document.getElementById('tokFO').textContent = info.fo.length;
  document.getElementById('tokSV').textContent = info.supervisor.length;
  document.getElementById('hkTokenList').innerHTML = renderTokenRows(info.hk);
  document.getElementById('foTokenList').innerHTML = renderTokenRows(info.fo);
  document.getElementById('svTokenList').innerHTML = renderTokenRows(info.supervisor);
}
document.getElementById('refreshTokensBtn').onclick = renderTokens;

(async()=>{
  setFirebaseStatus('firebaseStatus','checking');
  const fb = await checkFirebaseConnection();
  if(fb.ok) setFirebaseStatus('firebaseStatus','connected', fb.detail); else setFirebaseStatus('firebaseStatus', fb.mode, fb.detail);
  await seedData();
  await render();
  await renderTokens();
  if(isFirebaseReady()){
    const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(async(data)=>{await render(data); await renderTokens(); const fb2=await checkFirebaseConnection(); if(fb2.ok) setFirebaseStatus('firebaseStatus','connected', fb2.detail);})}},500);
  }
})();
</script></body></html>
